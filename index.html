<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JO STUDIO</title>
<!-- PWA Manifest (يدعم التثبيت) -->
<link rel="manifest" href="data:application/manifest+json,{name:'JO STUDIO',short_name:'JO',theme_color:'#09090b',background_color:'#09090b',display:'standalone',orientation:'portrait',icons:[{src:'https://picsum.photos/192',sizes:'192x192',type:'image/png'},{src:'https://picsum.photos/512',sizes:'512x512',type:'image/png'}]}">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
<style>
/* ========== الكود الأصلي كاملاً بدون تغيير ========== */
body{font-family:'Aref Ruqaa',serif}
.audio-player{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:95%;max-width:420px;background:linear-gradient(180deg,#111,#1a1a1a);border-top:3px solid #00d4ff;border-radius:24px 24px 0 0;padding:12px 14px;box-shadow:0 -8px 25px rgba(0,212,255,.25);transition:.5s ease;z-index:1000}
.control-btn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#1f1f1f;color:#eee;font-size:20px;transition:.3s}
.control-btn:hover{background:linear-gradient(45deg,#00d4ff,#00ffbb);color:#000;transform:scale(1.15)}
.tab-active{background:#fff;color:#000;font-weight:600}
.scrollable-list{max-height:40vh;overflow-y:auto}
.mini-disc{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:70px;height:70px;border-radius:50%;overflow:hidden;box-shadow:0 0 20px rgba(0,212,255,.5);animation:spin 6s linear infinite;cursor:pointer;z-index:999}
@keyframes spin{from{transform:translateX(-50%) rotate(0)}to{transform:translateX(-50%) rotate(360deg)}}
img.editable{max-width:100%;max-height:70vh;display:block;margin:auto;border-radius:12px;box-shadow:0 0 20px rgba(0,212,255,.3);}
canvas#editCanvas{border-radius:12px;display:block;margin:auto;background:#1a1a1a;}
button.tool-btn{background:#1f1f1f;color:#fff;padding:8px 12px;border-radius:12px;font-size:16px;transition:.3s}
button.tool-btn:hover{background:linear-gradient(45deg,#00d4ff,#00ffbb);color:#000;}
.filter-btn{padding:6px 10px;margin:2px;border-radius:10px;background:#1f1f1f;color:#fff;cursor:pointer;transition:.3s;}
.filter-btn:hover{background:linear-gradient(45deg,#00d4ff,#00ffbb);color:#000;}
.icon-btn { background: #1f1f1f; color: #fff; transition: 0.3s; }
.icon-btn:hover { background: linear-gradient(45deg, #00d4ff, #00ffbb); color: #000; }
.settings-panel { background: #18181b; border-left: 2px solid #00d4ff; }
.playlist-item { transition: 0.2s; }
.playlist-item:hover { background: #27272a; }

/* ========== إضافات جديدة (بدون حذف أي شيء أعلاه) ========== */
.search-bar { background: #1f1f1f; border: 1px solid #333; border-radius: 30px; padding: 8px 16px; color: white; }
.speed-control { background: #1f1f1f; border-radius: 20px; padding: 2px 8px; font-size: 14px; }
.visualizer-canvas { width: 100%; height: 40px; border-radius: 12px; background: #0a0a0a; margin: 5px 0; }
.crop-overlay { position: absolute; border: 2px dashed #00d4ff; pointer-events: none; }
.text-tool-panel { background: #1f1f1f; border-radius: 16px; padding: 12px; }
.draw-tool-btn.active { background: #00d4ff; color: black; }
.playlist-page { background: #0c0c0e; min-height: 100vh; }
/* light theme (إضافة ثيم فاتح) */
.light-theme { background: #f5f5f5 !important; color: #111 !important; }
.light-theme .bg-zinc-950, .light-theme .bg-zinc-900, .light-theme .bg-zinc-800 { background: #f0f0f0 !important; color: #000 !important; }
.light-theme .tab-active { background: #000 !important; color: #fff !important; }
.light-theme .icon-btn { background: #ddd; color: #000; }
.light-theme .audio-player { background: #eaeaea; border-top-color: #00a6c0; }
/* Font toggle */
body.font-sans { font-family: system-ui, -apple-system, sans-serif !important; }

/* ========== NEW: Video Player Controls ========== */
.video-player-container { position: fixed; inset: 0; background: black; z-index: 60; display: flex; flex-direction: column; }
.video-controls { background: rgba(0,0,0,0.7); padding: 8px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.video-controls button { background: #1f1f1f; color: white; border-radius: 30px; padding: 8px 16px; }
</style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

<!-- LOGIN (تم إصلاح مرجع كلمة السر) -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center fixed inset-0 z-50 bg-zinc-950">
<div class="max-w-md w-full px-6 text-center">
<h1 class="text-8xl font-bold">JO</h1>
<p class="text-5xl text-zinc-400 -mt-6">STUDIO</p>
<h2 class="text-3xl mt-12 mb-8" data-lang="welcome">مرحباً بعودتك، JO</h2>
<input id="passwordInput" type="password" class="w-full px-6 py-5 text-2xl rounded-3xl bg-zinc-900 border border-zinc-700 focus:border-cyan-400 text-center" placeholder="كلمة السر">
<p id="loginError" class="text-red-500 mt-4 hidden" data-lang="wrongPass">كلمة السر غير صحيحة</p>
<button onclick="login()" class="mt-8 w-full bg-white text-black font-bold py-6 rounded-3xl text-3xl" data-lang="loginBtn">دخول</button>
</div>
</div>

<!-- MAIN (بدون تغيير في الهيكل الأساسي) -->
<div id="playerScreen" class="hidden flex flex-col min-h-screen">
<div class="pt-8 px-6 pb-4 border-b border-zinc-800 relative">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="text-5xl font-bold">JO</span>
<span class="text-3xl text-zinc-400 -mt-2">STUDIO</span>
</div>
<button onclick="toggleSettings()" class="text-4xl icon-btn w-12 h-12 rounded-full flex items-center justify-center"><i class="fas fa-bars"></i></button>
</div>
<div class="flex bg-zinc-900 rounded-full p-1.5 mt-6">
<button onclick="switchTab('audio')" id="audioTab" class="flex-1 py-3 rounded-full tab-active"><i class="fas fa-music mr-2"></i><span data-lang="musicTab">موسيقى</span></button>
<button onclick="switchTab('video')" id="videoTab" class="flex-1 py-3 rounded-full"><i class="fas fa-video mr-2"></i><span data-lang="videoTab">فيديو</span></button>
<button onclick="switchTab('images')" id="imageTab" class="flex-1 py-3 rounded-full"><i class="fas fa-image mr-2"></i><span data-lang="imagesTab">صور</span></button>
</div>
</div>

<!-- SETTINGS SIDEBAR (إضافة إعدادات Visualizer + Font toggle) -->
<div id="settingsPanel" class="hidden fixed top-0 right-0 w-80 h-full settings-panel z-40 p-6 shadow-2xl">
<div class="flex justify-between items-center mb-8">
<h3 class="text-2xl font-bold" data-lang="settings">الإعدادات</h3>
<button onclick="toggleSettings()" class="text-2xl icon-btn w-10 h-10 rounded-full"><i class="fas fa-times"></i></button>
</div>
<div class="space-y-4">
<button onclick="toggleLanguage()" class="w-full py-3 px-4 bg-zinc-800 rounded-xl flex items-center justify-between hover:bg-zinc-700 transition">
<span><i class="fas fa-globe mr-3"></i><span data-lang="language">اللغة</span></span>
<span id="langIndicator" class="text-sm bg-zinc-900 px-3 py-1 rounded-full">العربية</span>
</button>
<button onclick="exportData()" class="w-full py-3 px-4 bg-zinc-800 rounded-xl flex items-center hover:bg-zinc-700 transition">
<i class="fas fa-download mr-3"></i><span data-lang="export">تصدير النسخة (JSON)</span>
</button>
<button onclick="importData()" class="w-full py-3 px-4 bg-zinc-800 rounded-xl flex items-center hover:bg-zinc-700 transition">
<i class="fas fa-upload mr-3"></i><span data-lang="import">استيراد نسخة (JSON)</span>
</button>
<button onclick="importFolder()" class="w-full py-3 px-4 bg-zinc-800 rounded-xl flex items-center hover:bg-zinc-700 transition">
<i class="fas fa-folder-open mr-3"></i><span data-lang="importFolder">استيراد مجلد صوتي</span>
</button>
<button onclick="openPlaylistManager()" class="w-full py-3 px-4 bg-zinc-800 rounded-xl flex items-center hover:bg-zinc-700 transition">
<i class="fas fa-list mr-3"></i><span data-lang="playlists">إدارة قوائم التشغيل</span>
</button>
<button onclick="toggleTheme()" class="w-full py-3 px-4 bg-zinc-800 rounded-xl flex items-center hover:bg-zinc-700 transition">
<i class="fas fa-palette mr-3"></i><span data-lang="theme">المظهر (داكن/فاتح)</span>
</button>
<!-- NEW: إعدادات Visualizer -->
<div class="bg-zinc-800 p-3 rounded-xl">
  <p class="text-sm mb-2"><i class="fas fa-chart-line mr-2"></i>إعدادات المؤشر الصوتي</p>
  <select id="visualizerColor" class="w-full bg-zinc-700 rounded p-2 mb-2" onchange="setVisualizerColor(this.value)">
    <option value="default">افتراضي (ملون)</option>
    <option value="black">أسود شفاف</option>
    <option value="white">أبيض</option>
    <option value="cyan">سماوي</option>
    <option value="none">إخفاء</option>
  </select>
</div>
<!-- NEW: Font toggle -->
<button onclick="toggleFont()" class="w-full py-3 px-4 bg-zinc-800 rounded-xl flex items-center hover:bg-zinc-700 transition">
  <i class="fas fa-font mr-3"></i><span id="fontToggleText">تغيير الخط (رقعة / عادي)</span>
</button>
</div>
</div>

<div class="flex-1 px-6 py-6 overflow-hidden">

<!-- AUDIO (إضافة شريط بحث) -->
<div id="audioLibrary">
<div class="flex justify-between mb-6">
<h2 class="text-3xl" data-lang="audioLib">مكتبة الموسيقى</h2>
<button onclick="importMedia('audio')" class="bg-white text-black px-6 py-3 rounded-3xl icon-btn flex items-center"><i class="fas fa-plus mr-2"></i><span data-lang="import">استيراد</span></button>
</div>
<input type="text" id="audioSearch" placeholder="بحث في الموسيقى..." class="search-bar w-full mb-4" oninput="filterAudio()">
<div id="audioList" class="scrollable-list space-y-3"></div>
</div>

<!-- VIDEO (إضافة شريط بحث) -->
<div id="videoLibrary" class="hidden">
<div class="flex justify-between mb-6">
<h2 class="text-3xl" data-lang="videoLib">مكتبة الفيديو</h2>
<button onclick="importMedia('video')" class="bg-white text-black px-6 py-3 rounded-3xl icon-btn flex items-center"><i class="fas fa-plus mr-2"></i><span data-lang="import">استيراد</span></button>
</div>
<input type="text" id="videoSearch" placeholder="بحث في الفيديو..." class="search-bar w-full mb-4" oninput="filterVideo()">
<div id="videoList" class="scrollable-list space-y-3"></div>
</div>

<!-- IMAGES (إضافة شريط بحث) -->
<div id="imageLibrary" class="hidden">
<div class="flex justify-between mb-6">
<h2 class="text-3xl" data-lang="imageLib">مكتبة الصور</h2>
<div>
<button onclick="importMedia('image')" class="bg-white text-black px-6 py-3 rounded-3xl icon-btn flex items-center"><i class="fas fa-plus mr-2"></i><span data-lang="import">استيراد</span></button>
<button onclick="openEditor(null)" class="bg-cyan-400 text-black px-6 py-3 rounded-3xl ml-2 icon-btn"><i class="fas fa-pen mr-2"></i><span data-lang="newEditor">محرر جديد</span></button>
</div>
</div>
<input type="text" id="imageSearch" placeholder="بحث في الصور..." class="search-bar w-full mb-4" oninput="filterImages()">
<div id="imageGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 overflow-y-auto max-h-60vh"></div>
</div>

<!-- IMAGE EDITOR MODAL (تم توسيعه بإضافات دون حذف) -->
<div id="imageEditorModal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-50 flex flex-col items-center justify-center p-4">
<canvas id="editCanvas"></canvas>
<div id="cropOverlay" class="crop-overlay hidden"></div>
<div class="flex flex-wrap justify-center mt-4 gap-2">
<button class="tool-btn" onclick="rotateImage()"><i class="fas fa-rotate-right mr-1"></i> <span data-lang="rotate">تدوير</span></button>
<button class="tool-btn" onclick="flipImage()"><i class="fas fa-arrow-right-arrow-left mr-1"></i> <span data-lang="flip">انعكاس</span></button>
<button class="tool-btn" id="cropModeBtn" onclick="toggleCropMode()"><i class="fas fa-crop mr-1"></i> <span data-lang="crop">قص</span></button>
<button class="tool-btn" onclick="resizeImage()"><i class="fas fa-up-right-and-down-left-from-center mr-1"></i> <span data-lang="resize">تغيير الحجم</span></button>
<button class="tool-btn" onclick="resetFilters()"><i class="fas fa-undo mr-1"></i> <span data-lang="resetFilter">فلتر الأصلية</span></button>
<button class="tool-btn" onclick="saveImage()"><i class="fas fa-save mr-1"></i> <span data-lang="save">حفظ</span></button>
<button class="tool-btn" onclick="toggleTextMode()"><i class="fas fa-font"></i> نص</button>
<button class="tool-btn" onclick="toggleDrawMode()"><i class="fas fa-paint-brush"></i> رسم</button>
<button class="tool-btn" onclick="undo()"><i class="fas fa-undo-alt"></i> تراجع</button>
<button class="tool-btn" onclick="redo()"><i class="fas fa-redo-alt"></i> إعادة</button>
</div>
<div class="flex flex-wrap justify-center mt-2 gap-2">
<button class="filter-btn" onclick="applyFilter('grayscale')"><span data-lang="grayscale">رمادي</span></button>
<button class="filter-btn" onclick="applyFilter('sepia')"><span data-lang="sepia">سيبيا</span></button>
<button class="filter-btn" onclick="applyFilter('invert')"><span data-lang="invert">عكسي</span></button>
<button class="filter-btn" onclick="applyFilter('brightness')"><span data-lang="brightness">سطوع</span></button>
<button class="filter-btn" onclick="applyFilter('contrast')"><span data-lang="contrast">تباين</span></button>
<div class="flex gap-2 mt-2">
  <input type="range" id="hueRange" min="-180" max="180" value="0" class="w-20" oninput="adjustHue(this.value)"> Hue
  <input type="range" id="satRange" min="0" max="200" value="100" class="w-20" oninput="adjustSaturation(this.value)"> Sat
  <input type="range" id="expRange" min="0" max="200" value="100" class="w-20" oninput="adjustExposure(this.value)"> Exp
</div>
<select onchange="setAspectRatio(this.value)" class="bg-zinc-800 rounded px-2">
  <option value="">نسبة</option><option value="1:1">1:1</option><option value="16:9">16:9</option><option value="9:16">9:16</option><option value="4:5">4:5</option>
</select>
</div>
<div id="textToolPanel" class="text-tool-panel hidden absolute bottom-20 left-1/2 transform -translate-x-1/2 flex gap-3">
  <input id="textInput" placeholder="نص" class="bg-zinc-800 rounded px-3">
  <input id="textColor" type="color" value="#ffffff">
  <input id="textSize" type="number" value="30" min="10" max="100" class="w-16">
  <button onclick="addText()">إضافة</button>
</div>
<button onclick="closeEditor()" class="absolute top-4 left-4 text-4xl icon-btn w-12 h-12 rounded-full"><i class="fas fa-times"></i></button>
</div>

<!-- PLAYLIST MANAGER MODAL (بدون تغيير لكن نضيف ميزة فتح صفحة القائمة) -->
<div id="playlistModal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4">
<div class="bg-zinc-900 w-full max-w-lg rounded-3xl p-6 max-h-[80vh] overflow-y-auto">
<div class="flex justify-between items-center mb-4">
<h3 class="text-2xl" data-lang="playlistManager">إدارة قوائم التشغيل</h3>
<button onclick="closePlaylistManager()" class="icon-btn w-10 h-10 rounded-full"><i class="fas fa-times"></i></button>
</div>
<div class="mb-4">
<input id="newPlaylistName" type="text" placeholder="اسم القائمة" class="w-full px-4 py-3 rounded-xl bg-zinc-800 border border-zinc-700" data-lang-placeholder="playlistNamePlaceholder">
<button onclick="createPlaylist()" class="mt-2 w-full bg-white text-black py-3 rounded-xl icon-btn"><i class="fas fa-plus mr-2"></i><span data-lang="createPlaylist">إنشاء قائمة جديدة</span></button>
</div>
<div id="playlistSelector" class="flex flex-wrap gap-2 mb-4"></div>
<div id="playlistSongs" class="space-y-2 max-h-60 overflow-y-auto"></div>
<button onclick="openPlaylistPage(currentPlaylistId)" class="mt-4 w-full bg-cyan-400 text-black py-2 rounded-xl">فتح صفحة القائمة</button>
</div>
</div>

<!-- NEW: PLAYLIST DEDICATED PAGE (صفحة مخصصة لقائمة التشغيل) -->
<div id="playlistPage" class="hidden fixed inset-0 z-50 playlist-page bg-zinc-950 text-white p-6 overflow-auto">
  <div class="max-w-4xl mx-auto">
    <button onclick="closePlaylistPage()" class="icon-btn w-12 h-12 rounded-full mb-6"><i class="fas fa-arrow-right"></i> رجوع</button>
    <div class="flex items-center gap-4 mb-8">
      <h2 id="playlistPageTitle" class="text-4xl font-bold">قائمة التشغيل</h2>
      <button onclick="editPlaylistName()" class="icon-btn w-10 h-10 rounded-full"><i class="fas fa-pen"></i></button>
    </div>
    <div class="flex gap-4 mb-6">
      <button onclick="playPlaylistAll()" class="bg-white text-black px-6 py-3 rounded-3xl"><i class="fas fa-play mr-2"></i> تشغيل الكل</button>
      <button onclick="shufflePlaylist()" class="bg-zinc-800 px-6 py-3 rounded-3xl"><i class="fas fa-random mr-2"></i> عشوائي</button>
      <button onclick="importToPlaylist()" class="bg-zinc-800 px-6 py-3 rounded-3xl"><i class="fas fa-plus mr-2"></i> إضافة أغاني</button>
      <button onclick="importFolderToPlaylist()" class="bg-zinc-800 px-6 py-3 rounded-3xl"><i class="fas fa-folder-open"></i> استيراد مجلد</button>
    </div>
    <div id="playlistPageSongs" class="space-y-3"></div>
  </div>
</div>

<!-- MINI PLAYER (إضافة visualizer + speed + shuffle) -->
<div id="miniPlayer" class="audio-player hidden">
<button onclick="toggleMini()" class="absolute top-2 right-4 text-xl icon-btn w-8 h-8 rounded-full"><i class="fas fa-times"></i></button>
<div class="flex items-center gap-3">
<img id="miniCover" class="w-14 h-14 rounded-xl object-cover">
<div class="flex-1">
<div id="nowTitle" class="truncate"></div>
<div id="nowArtist" class="text-zinc-400 text-sm"></div>
</div>
</div>
<!-- NEW: Visualizer canvas -->
<canvas id="visualizer" class="visualizer-canvas"></canvas>
<div class="flex justify-center gap-4 my-3">
<button onclick="prevSong()" class="control-btn"><i class="fas fa-backward-step"></i></button>
<button onclick="togglePlay()" id="playBtn" class="control-btn"><i class="fas fa-play"></i></button>
<button onclick="nextSong()" class="control-btn"><i class="fas fa-forward-step"></i></button>
<button onclick="toggleRepeat()" id="repeatBtn" class="control-btn"><i class="fas fa-repeat"></i></button>
<button onclick="toggleShuffle()" id="shuffleBtn" class="control-btn"><i class="fas fa-random"></i></button>
</div>
<div class="flex items-center gap-2">
<span id="currentTime" class="text-xs w-10">0:00</span>
<div class="flex-1 h-2 bg-zinc-700 rounded-full" onclick="seekAudio(event)">
<div id="progressFill" class="h-full bg-cyan-400 rounded-full w-0"></div>
</div>
<span id="totalTime" class="text-xs w-10">0:00</span>
</div>
<!-- Speed control -->
<div class="flex justify-center mt-2">
  <select id="speedSelect" class="speed-control" onchange="setPlaybackSpeed(this.value)">
    <option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="1.75">1.75x</option><option value="2">2x</option>
  </select>
</div>
</div>

<div id="miniDisc" class="mini-disc hidden" onclick="toggleMini()">
<img id="discCover" class="w-full h-full object-cover">
<canvas id="discVisualizer" class="absolute inset-0 w-full h-full opacity-70"></canvas>
</div>

<!-- NEW: Enhanced Video Player -->
<div id="videoPlayerUI" class="video-player-container hidden">
  <div style="flex:1; display:flex; align-items:center; justify-content:center;">
    <video id="videoElement" style="max-width:100%; max-height:100%;" controlsList="nodownload"></video>
  </div>
  <div class="video-controls">
    <button onclick="closeVideoPlayer()"><i class="fas fa-times"></i> إغلاق</button>
    <button onclick="toggleFullscreen()"><i class="fas fa-expand"></i> ملء الشاشة</button>
    <button onclick="skipVideo(-10)"><i class="fas fa-backward"></i> -10s</button>
    <button onclick="skipVideo(10)"><i class="fas fa-forward"></i> +10s</button>
    <button onclick="zoomVideo(0.1)"><i class="fas fa-search-plus"></i> تكبير</button>
    <button onclick="zoomVideo(-0.1)"><i class="fas fa-search-minus"></i> تصغير</button>
    <button onclick="captureScreenshot()"><i class="fas fa-camera"></i> لقطة شاشة</button>
  </div>
</div>

<audio id="audioElement"></audio>
<input type="file" id="fileInput" multiple class="hidden">
<input type="file" id="folderInput" webkitdirectory directory class="hidden">

<script>
// ========== الكود الأصلي كما هو (مع الحفاظ عليه 100%) ==========
// ---------- MULTI-LANGUAGE SUPPORT ----------
const translations = {
  ar: {
    welcome: 'مرحباً بعودتك، JO',
    wrongPass: 'كلمة السر غير صحيحة',
    loginBtn: 'دخول',
    musicTab: 'موسيقى',
    videoTab: 'فيديو',
    imagesTab: 'صور',
    settings: 'الإعدادات',
    language: 'اللغة',
    export: 'تصدير النسخة (JSON)',

// ---------- EXPORT / IMPORT JSON (محسّن: يحفظ الملفات كـ Base64 داخل JSON) ----------
async function exportData() {
  const data = {
    audioSongs: await Promise.all(audioSongs.map(async s => ({
      title: s.title, artist: s.artist, src: await blobToBase64(await fetch(s.src).then(r=>r.blob())), cover: await blobToBase64(await fetch(s.cover).then(r=>r.blob()))
    }))),
    videoClips: await Promise.all(videoClips.map(async v => ({
      title: v.title, src: await blobToBase64(await fetch(v.src).then(r=>r.blob())), thumbnail: v.thumbnail ? await blobToBase64(await fetch(v.thumbnail).then(r=>r.blob())) : ''
    }))),
    imageFiles: await Promise.all(imageFiles.map(async i => ({
      name: i.name, src: await blobToBase64(await fetch(i.src).then(r=>r.blob()))
    }))),
    playlists
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'jo_studio_backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function blobToBase64(blob) {
  return new Promise(resolve => {
    const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(blob);
  });
}
async function importData() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    const text = await file.text();
    try {
      const data = JSON.parse(text);
      if (data.audioSongs) {
        audioSongs = await Promise.all(data.audioSongs.map(async s => ({
          ...s, src: URL.createObjectURL(await base64ToBlob(s.src)), cover: URL.createObjectURL(await base64ToBlob(s.cover))
        })));
        renderAudioList();
      }
      if (data.videoClips) {
        videoClips = await Promise.all(data.videoClips.map(async v => ({
          ...v, src: URL.createObjectURL(await base64ToBlob(v.src)), thumbnail: v.thumbnail ? URL.createObjectURL(await base64ToBlob(v.thumbnail)) : ''
        })));
        renderVideoList();
      }
      if (data.imageFiles) {
        imageFiles = await Promise.all(data.imageFiles.map(async i => ({
          ...i, src: URL.createObjectURL(await base64ToBlob(i.src))
        })));
        renderImageGrid();
      }
      if (data.playlists) { playlists = data.playlists; localStorage.setItem('jo_playlists', JSON.stringify(playlists)); }
      saveToStorage();
      alert('تم استيراد البيانات بنجاح.');
    } catch (err) { alert('ملف JSON غير صالح'); }
  };
  input.click();
}
function base64ToBlob(base64) {
  return fetch(base64).then(r => r.blob());
}

// ---------- IMPORT FOLDER (AUDIO) ----------
function importFolder() {
  folderInput.value = '';
  folderInput.onchange = function(e) {
    const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      jsmediatags.read(file, {
        onSuccess: tag => {
          let cover = 'https://picsum.photos/300';
          if (tag.tags.picture) {
            const blob = new Blob([new Uint8Array(tag.tags.picture.data)], {type: 'image/jpeg'});
            cover = URL.createObjectURL(blob);
          }
          audioSongs.push({ title: file.name.replace(/\.[^/.]+$/, ''), artist: tag.tags.artist || 'من جهازك', src: url, cover });
          renderAudioList(); saveToStorage();
        },
        onError: () => {
          audioSongs.push({ title: file.name.replace(/\.[^/.]+$/, ''), artist: 'غير معروف', src: url, cover: 'https://picsum.photos/300' });
          renderAudioList(); saveToStorage();
        }
      });
    });
  };
  folderInput.click();
}

// ---------- IMPORT MEDIA (SINGLE) ----------
function importMedia(type){
fileInput.accept=type==='audio'?'audio/*':type==='video'?'video/*':'image/*';
fileInput.onchange=function(e){
Array.from(e.target.files).forEach(file=>{
const url=URL.createObjectURL(file);
if(file.type.startsWith('audio/')){
jsmediatags.read(file,{onSuccess:tag=>{
let cover='https://picsum.photos/300';
if(tag.tags.picture){
const blob=new Blob([new Uint8Array(tag.tags.picture.data)],{type:'image/jpeg'});
cover=URL.createObjectURL(blob);
}
audioSongs.push({title:file.name.replace(/\.[^/.]+$/,''),artist:tag.tags.artist||'من جهازك',src:url,cover});
renderAudioList(); saveToStorage();
}});
}else if(file.type.startsWith('video/')){
  const video = document.createElement('video'); video.src = url; video.crossOrigin = 'anonymous';
  video.addEventListener('loadeddata', function() { video.currentTime = 1; });
  video.addEventListener('seeked', function() {
    const canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const thumbnail = canvas.toDataURL('image/jpeg');
    videoClips.push({title:file.name.replace(/\.[^/.]+$/,''),src:url,thumbnail});
    renderVideoList(); saveToStorage(); video.remove();
  });
  video.load();
}else{
imageFiles.push({name:file.name,src:url});
renderImageGrid(); saveToStorage();
}
});
fileInput.value='';
}
fileInput.click();
}

function playAudio(i){currentAudioIndex=i;const s=audioSongs[i];audioEl.src=s.src;miniCover.src=s.cover;discCover.src=s.cover;nowTitle.textContent=s.title;nowArtist.textContent=s.artist;miniPlayer.classList.remove('hidden');togglePlay();}
function togglePlay(){if(isPlaying){audioEl.pause();playBtn.innerHTML='<i class="fas fa-play"></i>'}else{audioEl.play();playBtn.innerHTML='<i class="fas fa-pause"></i>'}isPlaying=!isPlaying;}
function nextSong(){if(currentAudioIndex<audioSongs.length-1)playAudio(currentAudioIndex+1);else if(isRepeat)playAudio(0)}
function prevSong(){if(currentAudioIndex>0)playAudio(currentAudioIndex-1)}
function toggleRepeat(){isRepeat=!isRepeat;repeatBtn.style.background=isRepeat?'#00d4ff':'#1f1f1f'}
function toggleMini(){if(!isMini){miniPlayer.classList.add('hidden');miniDisc.classList.remove('hidden');}else{miniDisc.classList.add('hidden');miniPlayer.classList.remove('hidden');}isMini=!isMini;}

function formatTime(s){let m=Math.floor(s/60);let sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
audioEl.addEventListener('ended', ()=>{ if (isRepeat) { playAudio(currentAudioIndex); } else { nextSong(); } });

// ---------- IMAGE EDITOR (الأصلي مع إضافات) ----------
function openEditor(img){
currentImage=new Image();
currentImage.onload=()=>{editCanvas.width=currentImage.width>800?800:currentImage.width;editCanvas.height=currentImage.height>600?600:currentImage.height;ctx.drawImage(currentImage,0,0,editCanvas.width,editCanvas.height);originalImage=ctx.getImageData(0,0,editCanvas.width,editCanvas.height);}
currentImage.src=img?img.src:'https://picsum.photos/600';
imageEditorModal.classList.remove('hidden');
}
function closeEditor(){imageEditorModal.classList.add('hidden');ctx.clearRect(0,0,editCanvas.width,editCanvas.height);filterState='none';}
function rotateImage(){ctx.save();ctx.clearRect(0,0,editCanvas.width,editCanvas.height);ctx.translate(editCanvas.width/2,editCanvas.height/2);ctx.rotate(90*Math.PI/180);ctx.drawImage(currentImage,-editCanvas.width/2,-editCanvas.height/2,editCanvas.width,editCanvas.height);ctx.restore();}
function flipImage(){ctx.save();ctx.clearRect(0,0,editCanvas.width,editCanvas.height);ctx.translate(editCanvas.width,0);ctx.scale(-1,1);ctx.drawImage(currentImage,0,0,editCanvas.width,editCanvas.height);ctx.restore();}
function cropImage(){let w=editCanvas.width/2,h=editCanvas.height/2;let imgData=ctx.getImageData(editCanvas.width/4,editCanvas.height/4,w,h);editCanvas.width=w;editCanvas.height=h;ctx.putImageData(imgData,0,0);}
function resizeImage(){let w=editCanvas.width/1.5,h=editCanvas.height/1.5;let imgData=ctx.getImageData(0,0,editCanvas.width,editCanvas.height);editCanvas.width=w;editCanvas.height=h;ctx.putImageData(imgData,0,0);}
function applyFilter(f){filterState=f;ctx.putImageData(originalImage,0,0);ctx.filter=f==='grayscale'?'grayscale(100%)':f==='sepia'?'sepia(100%)':f==='invert'?'invert(100%)':f==='brightness'?'brightness(150%)':f==='contrast'?'contrast(150%)':'none';ctx.drawImage(currentImage,0,0,editCanvas.width,editCanvas.height);}
function resetFilters(){filterState='none';ctx.putImageData(originalImage,0,0);ctx.drawImage(currentImage,0,0,editCanvas.width,editCanvas.height);}
function saveImage(){let link=document.createElement('a');link.download='edited_image.png';link.href=editCanvas.toDataURL();link.click();}

function renderPlaylistManager() {
  const selector = document.getElementById('playlistSelector'); selector.innerHTML = '';
  Object.keys(playlists).forEach(id => {
    const btn = document.createElement('button'); btn.className = 'px-4 py-2 bg-zinc-800 rounded-full text-sm';

  });

function selectPlaylist(id) {
  currentPlaylistId = id; const playlist = playlists[id]; const container = document.getElementById('playlistSongs');
  if (!playlist) return; container.innerHTML = `<h4 class="text-lg mb-2">${playlist.name}</h4>`;
  if (playlist.songs.length === 0) { container.innerHTML += `<p class="text-zinc-400" data-lang="noSongs">${translations[currentLang].noSongs}</p>`; return; }
  playlist.songs.forEach((songIdx, idx) => {
    const song = audioSongs[songIdx]; if (!song) return;

    div.innerHTML = `<img src="${song.cover}" class="w-8 h-8 rounded"><span class="flex-1">${song.title}</span><button class="icon-btn w-8 h-8 rounded-full" onclick="removeFromPlaylist('${id}', ${idx})"><i class="fas fa-trash"></i></button>`;
    container.appendChild(div);
  });
}
function createPlaylist() {
  const name = document.getElementById('newPlaylistName').value.trim(); if (!name) return;
  const id = Date.now().toString(); playlists[id] = { name, songs: [] };
  localStorage.setItem('jo_playlists', JSON.stringify(playlists));
  document.getElementById('newPlaylistName').value = ''; renderPlaylistManager();
}
function addToPlaylist(songIndex) {
  if (!currentPlaylistId) { alert('الرجاء اختيار قائمة أولاً'); return; }
  if (!playlists[currentPlaylistId].songs.includes(songIndex)) {
    playlists[currentPlaylistId].songs.push(songIndex); localStorage.setItem('jo_playlists', JSON.stringify(playlists)); selectPlaylist(currentPlaylistId);
  }
}
function removeFromPlaylist(playlistId, index) {
  playlists[playlistId].songs.splice(index, 1); localStorage.setItem('jo_playlists', JSON.stringify(playlists)); selectPlaylist(playlistId);
}

function setVisualizerColor(val) { visColor = val; }
function setupVisualizer() {
  if(!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyser); analyser.connect(audioCtx.destination);
  }
  const canvas = document.getElementById('visualizer'), ctxV = canvas.getContext('2d');
  const discCanvas = document.getElementById('discVisualizer'), ctxD = discCanvas.getContext('2d');
  function draw() {
    requestAnimationFrame(draw);
    if(!analyser || visColor === 'none') return;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
    drawVisualizer(canvas, ctxV, dataArray, visColor);
    drawVisualizer(discCanvas, ctxD, dataArray, visColor);
  }
  function drawVisualizer(canv, ctxV, data, colorMode) {
    const w = canv.width, h = canv.height; ctxV.clearRect(0,0,w,h);
    const barWidth = w / 64;
    for(let i=0;i<64;i++) {
      let barHeight = (data[i] / 255) * h;
      let fillColor;
      if(colorMode === 'default') fillColor = `hsl(${(i / 64) * 360}, 100%, 50%)`;
      else if(colorMode === 'black') fillColor = 'rgba(0,0,0,0.5)';
      else if(colorMode === 'white') fillColor = 'white';
      else if(colorMode === 'cyan') fillColor = '#00d4ff';
      ctxV.fillStyle = fillColor;
      ctxV.fillRect(i*barWidth, h-barHeight, barWidth-1, barHeight);
    }
  }
  audioEl.addEventListener('play', () => { if(audioCtx?.state==='suspended') audioCtx.resume(); draw(); });
}
audioEl.addEventListener('play', setupVisualizer);

// ----- محرر الصور المحسن (Crop سحب، نص، رسم، undo/redo) -----
let history = [], historyStep = -1;
function saveHistory() { history = history.slice(0, historyStep+1); history.push(ctx.getImageData(0,0,editCanvas.width, editCanvas.height)); historyStep++; }
function undo() { if(historyStep>0) { historyStep--; ctx.putImageData(history[historyStep],0,0); } }
function redo() { if(historyStep < history.length-1) { historyStep++; ctx.putImageData(history[historyStep],0,0); } }
let cropMode = false;
function toggleCropMode() { cropMode = !cropMode; editCanvas.style.cursor = cropMode ? 'crosshair' : 'default'; }
// Text & Draw
function toggleTextMode() { document.getElementById('textToolPanel').classList.toggle('hidden'); }
function addText() {
  const txt = document.getElementById('textInput').value; if(!txt) return;
  ctx.font = `${document.getElementById('textSize').value}px Aref Ruqaa`; ctx.fillStyle = document.getElementById('textColor').value;
  ctx.fillText(txt, 50, 50); saveHistory();
}
let drawing = false;
function toggleDrawMode() {
  drawing = !drawing; editCanvas.style.cursor = drawing ? 'crosshair' : 'default';
}
editCanvas.addEventListener('mousedown', (e) => { if(drawing) { ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); } });
editCanvas.addEventListener('mousemove', (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
editCanvas.addEventListener('mouseup', () => { if(drawing) saveHistory(); });

// ----- صفحة Playlist مخصصة (مع تشغيل فعلي) -----
let openedPlaylistId = null;
function openPlaylistPage(id) {
  if(!id) return; openedPlaylistId = id;
  document.getElementById('playlistPage').classList.remove('hidden');
  document.getElementById('playlistPageTitle').textContent = playlists[id].name;
  renderPlaylistPageSongs();
}
function closePlaylistPage() { document.getElementById('playlistPage').classList.add('hidden'); }
function renderPlaylistPageSongs() {
  const cont = document.getElementById('playlistPageSongs'); cont.innerHTML = '';
  playlists[openedPlaylistId].songs.forEach((songIdx, idx) => {
    const s = audioSongs[songIdx]; if(!s) return;
    const div = document.createElement('div'); div.className = 'flex gap-3 bg-zinc-900 p-3 rounded-2xl items-center';
    div.innerHTML = `<img src="${s.cover}" class="w-10 h-10 rounded"><span class="flex-1">${s.title}</span>
      <button class="icon-btn w-8 h-8 rounded-full" onclick="playAudio(${songIdx})"><i class="fas fa-play"></i></button>
      <button class="icon-btn w-8 h-8 rounded-full" onclick="removeFromPlaylist('${openedPlaylistId}', ${idx}); renderPlaylistPageSongs();"><i class="fas fa-trash"></i></button>`;
    cont.appendChild(div);
  });
}
function editPlaylistName() {
  const newName = prompt('اسم جديد:', playlists[openedPlaylistId].name);
  if(newName) { playlists[openedPlaylistId].name = newName; localStorage.setItem('jo_playlists', JSON.stringify(playlists)); document.getElementById('playlistPageTitle').textContent = newName; }
}
function playPlaylistAll() {
  const songs = playlists[openedPlaylistId].songs;
  if(songs.length) { currentAudioIndex = songs[0]; playAudio(songs[0]); }
}
function shufflePlaylist() {
  const songs = [...playlists[openedPlaylistId].songs];
  if(songs.length) { currentAudioIndex = songs[Math.floor(Math.random()*songs.length)]; playAudio(currentAudioIndex); }
}
function importToPlaylist() {
  // عرض نافذة صغيرة لاختيار أغاني من المكتبة
  const selected = prompt('أدخل أرقام الأغاني مفصولة بفواصل (مثال: 0,2,5)');
  if(selected) {
    selected.split(',').forEach(i => {
      const idx = parseInt(i.trim());
      if(!isNaN(idx) && audioSongs[idx] && !playlists[openedPlaylistId].songs.includes(idx))
        playlists[openedPlaylistId].songs.push(idx);
    });
    localStorage.setItem('jo_playlists', JSON.stringify(playlists));
    renderPlaylistPageSongs();
  }
}
function importFolderToPlaylist() {
  folderInput.value = '';
  folderInput.onchange = function(e) {
    const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      jsmediatags.read(file, {
        onSuccess: tag => {
          let cover = 'https://picsum.photos/300';
          if (tag.tags.picture) {
            const blob = new Blob([new Uint8Array(tag.tags.picture.data)], {type: 'image/jpeg'});
            cover = URL.createObjectURL(blob);
          }
          const newSong = { title: file.name.replace(/\.[^/.]+$/, ''), artist: tag.tags.artist || 'من جهازك', src: url, cover };
          audioSongs.push(newSong);
          const newIdx = audioSongs.length - 1;
          playlists[openedPlaylistId].songs.push(newIdx);
          renderAudioList(); saveToStorage();
        },
        onError: () => {
          const newSong = { title: file.name.replace(/\.[^/.]+$/, ''), artist: 'غير معروف', src: url, cover: 'https://picsum.photos/300' };
          audioSongs.push(newSong);
          const newIdx = audioSongs.length - 1;
          playlists[openedPlaylistId].songs.push(newIdx);
          renderAudioList(); saveToStorage();
        }
      });
    });
    localStorage.setItem('jo_playlists', JSON.stringify(playlists));
    renderPlaylistPageSongs();
  };
  folderInput.click();
}

// ----- Drag & Drop (إضافة عامة) -----
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  files.forEach(f => {
    if(f.type.startsWith('audio')) importMedia('audio');
    else if(f.type.startsWith('video')) importMedia('video');
    else if(f.type.startsWith('image')) importMedia('image');
  });
});

// ----- Keyboard Shortcuts -----
document.addEventListener('keydown', e => {
  if(e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if(e.code === 'ArrowLeft') prevSong();
  if(e.code === 'ArrowRight') nextSong();
});

// ----- PWA Service Worker (محسّن لدعم العمل بدون إنترنت بالكامل) -----
if('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'jo-studio-v1';
    const urlsToCache = [
      './',
      'https://cdn.tailwindcss.com',
      'https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css',
      'https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js',
      'https://fonts.gstatic.com/s/arefruqaa/v10/WwkbxPW1E165rajQKDulIII4Vg.ttf',
      'https://picsum.photos/300'
    ];
    self.addEventListener('install', event => {
      event.waitUntil(
        caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
      );
    });
    self.addEventListener('fetch', event => {
      event.respondWith(
        caches.match(event.request).then(response => response || fetch(event.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
